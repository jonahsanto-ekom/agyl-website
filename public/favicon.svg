  <!-- Inner negative trapezoid base - lower interior void -->
  <path class="void" d="M28 82 L72 82 Q75 82 75 85 L75 102 Q75 105 72 105 L28 105 Q25 105 25 102 L25 85 Q25 82 28 82 Z"/>
</svg>
