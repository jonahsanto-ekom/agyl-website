<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 114">
  <style>
    .mark { fill: #0A0A0A; }
    .void { fill: #FFFFFF; }
    @media (prefers-color-scheme: dark) {
      .mark { fill: #F5F4F1; }
      .void { fill: #0A0A0A; }
    }
  </style>
  <!-- Outer triangle - the A's pyramid silhouette -->
  <path class="mark" d="M50 4 L96 110 L4 110 Z"/>
  <!-- Inner negative triangle - upper interior void -->
